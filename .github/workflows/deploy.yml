name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Build
        env:
          VITE_SUPABASE_URL: "https://qijruodreazuicbcyhvk.supabase.co"
          VITE_SUPABASE_PUBLISHABLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpanJ1b2RyZWF6dWljYmN5aHZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA3MDkwMjUsImV4cCI6MjA4NjI4NTAyNX0.vV3oEwvZrQdCmgMRT9EVZrSP9sU3g0XcSmojThx0opE"
        run: |
          npm ci
          npm run build
          # Create 404 fallback for BrowserRouter
          cp dist/index.html dist/404.html

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
